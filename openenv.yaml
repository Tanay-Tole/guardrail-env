name: guardrail-env
version: "0.1.0"
description: "A real-world environment where agents act as Trust & Safety moderators evaluating messages."
server:
  entrypoint: "uvicorn guardrail_env.server.app:app --host 0.0.0.0 --port 8000"
tasks:
  - id: easy
    description: "Classify obvious spam vs normal user queries."
  - id: medium
    description: "Identify PII (Personally Identifiable Information) and subtle policy violations."
  - id: hard
    description: "Detect complex prompt injections and adversarial jailbreaks."